<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tak Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">
    <header class="mb-4 text-center">
        <h1 class="text-4xl font-bold text-green-700 mb-2">Tak Online</h1>
        <div id="room-info" class="hidden text-sm">
            Game Code: <code id="room-code-display" class="font-mono"></code>
            <button id="copy-code-btn" class="ml-2 px-2 py-1 bg-green-600 text-white rounded">Copy</button>
        </div>
    </header>

    <div id="lobby-container" class="text-center bg-white p-6 rounded shadow w-full max-w-md">
        <h2 class="text-2xl font-semibold mb-4">Join or Create a Game</h2>
        <div class="lobby-controls mb-2">
            <button id="btn-create-game" class="px-4 py-2 bg-green-600 text-white rounded">Create New Game</button>
        </div>
        <div class="lobby-controls mb-2">
            <span class="text-gray-600">OR</span>
        </div>
        <div class="lobby-controls flex justify-center items-center gap-2">
            <input type="text" id="input-room-code" class="border p-2 rounded" placeholder="Enter game code..." maxlength="6" />
            <button id="btn-join-game" class="px-4 py-2 bg-blue-600 text-white rounded">Join Game</button>
        </div>
        <p id="lobby-error-message" class="error-message text-red-600 mt-2"></p>
    </div>

    <div id="game-container" class="hidden bg-white p-4 rounded shadow w-full max-w-lg">
        <div id="player-info" class="mb-4">
            <p class="font-semibold">Current Turn: <span id="current-player">White</span></p>
            <div id="piece-counts" class="text-sm">
                <p>White: <span id="white-flats">?</span> Flats, <span id="white-capstones">?</span> Capstone</p>
                <p>Black: <span id="black-flats">?</span> Flats, <span id="black-capstones">?</span> Capstone</p>
            </div>
        </div>

        <div id="game-board" class="mb-4">
            <!-- Cells will be generated by JavaScript -->
        </div>

        <div id="controls" class="mb-4">
            <fieldset>
                <legend>Actions</legend>
                <button id="btn-place-flat" class="px-3 py-1 bg-green-600 text-white rounded" data-action="place_flat">Place Flat</button>
                <button id="btn-place-wall" class="px-3 py-1 bg-green-600 text-white rounded" data-action="place_wall">Place Wall</button>
                <button id="btn-place-capstone" class="px-3 py-1 bg-green-600 text-white rounded" data-action="place_capstone">Place Capstone</button>
                <button id="btn-move-stack" class="px-3 py-1 bg-green-600 text-white rounded" data-action="move_select_source">Move Stack</button>
                <button id="btn-reset-game" class="px-3 py-1 bg-red-600 text-white rounded" data-action="reset_game">Reset Game</button>
            </fieldset>
            <p class="action-display">Current Mode: <span id="current-action-display">Place Flat</span></p>
        </div>

        <div id="move-controls-panel">
            <!-- Move-specific controls will be rendered here by JavaScript -->
        </div>

        <div id="game-messages" class="mt-4 p-2 bg-blue-100 text-blue-800 rounded">
            <p>Loading game...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize the app once the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.takGameApp.init();
        });
    </script>
</body>
</html>
