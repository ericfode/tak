<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tak Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tak Online</h1>
        <div id="room-info" class="hidden">
            Game Code: <code id="room-code-display"></code>
            <button id="copy-code-btn">Copy</button>
        </div>
    </header>

    <div id="lobby-container">
        <h2>Join or Create a Game</h2>
        <div class="lobby-controls">
            <button id="btn-create-game">Create New Game</button>
        </div>
        <div class="lobby-controls">
            <span>OR</span>
        </div>
        <div class="lobby-controls">
            <input type="text" id="input-room-code" placeholder="Enter game code..." maxlength="6" />
            <button id="btn-join-game">Join Game</button>
        </div>
        <p id="lobby-error-message" class="error-message"></p>
    </div>

    <div id="game-container" class="hidden">
        <div id="player-info">
            <p>Current Turn: <span id="current-player">White</span></p>
            <div id="piece-counts">
                <p>White: <span id="white-flats">?</span> Flats, <span id="white-capstones">?</span> Capstone</p>
                <p>Black: <span id="black-flats">?</span> Flats, <span id="black-capstones">?</span> Capstone</p>
            </div>
        </div>

        <div id="game-board">
            <!-- Cells will be generated by JavaScript -->
        </div>

        <div id="controls">
            <fieldset>
                <legend>Actions</legend>
                <button id="btn-place-flat" data-action="place_flat">Place Flat</button>
                <button id="btn-place-wall" data-action="place_wall">Place Wall</button>
                <button id="btn-place-capstone" data-action="place_capstone">Place Capstone</button>
                <button id="btn-move-stack" data-action="move_select_source">Move Stack</button>
                <!-- Reset button will be added here by JS -->
            </fieldset>
            <p class="action-display">Current Mode: <span id="current-action-display">Place Flat</span></p>
        </div>

        <div id="move-controls-panel">
            <!-- Move-specific controls will be rendered here by JavaScript -->
        </div>

        <div id="game-messages">
            <p>Loading game...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize the app once the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.takGameApp.init();
        });
    </script>
</body>
</html>
